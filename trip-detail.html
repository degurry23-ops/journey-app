<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>行程详情 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .cover { background: linear-gradient(135deg, var(--fg), #1E293B); color: #fff; padding: 80px 0 32px; position: relative; overflow: hidden; }
  .cover::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(0,82,255,.35), transparent 50%), radial-gradient(circle at 20% 80%, rgba(77,124,255,.2), transparent 50%); pointer-events: none; }
  .cover::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; }
  .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: -30px; position: relative; z-index: 2; }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); text-decoration: none; color: var(--fg); transition: all .2s; }
  .action-btn:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .action-btn .icon { font-size: 28px; } .action-btn .label { font-size: 13px; font-weight: 500; color: var(--muted-fg); }
  .day-card { cursor: pointer; text-decoration: none; color: inherit; display: block; margin-bottom: 12px; }
  @media (max-width: 768px) { .cover { padding: 48px 0 24px; } }
</style>
</head>
<body>

<section class="cover"><div class="container" style="position:relative;z-index:2;">
  <a href="journeys.html" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;margin-bottom:20px;display:inline-block;"><i class="fas fa-arrow-left"></i> 返回</a>
  <div style="display:flex;align-items:start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
    <div><h1 style="font-family:var(--font-display);font-size:clamp(2rem,3vw,3rem);line-height:1.15;" id="tripTitle"></h1>
    <p style="font-size:15px;opacity:.7;margin-top:8px;" id="tripMeta"></p></div>
    <span id="tripStatus" style="font-size:13px;padding:6px 14px;"></span>
  </div>
  <div style="max-width:400px;margin-top:24px;background:rgba(255,255,255,.12);border-radius:var(--radius-lg);padding:20px;backdrop-filter:blur(8px);">
    <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;"><span>旅行准备度</span><span style="font-weight:600;">65%</span></div>
    <div style="background:rgba(255,255,255,.15);border-radius:999px;height:8px;overflow:hidden;">
      <div style="width:65%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;animation:progress .8s ease-out;" class="animate-progress"></div>
    </div>
  </div>
</div></section>

<div class="container" style="margin-top:-24px;position:relative;z-index:2;">
  <div class="quick-actions">
    <a href="map.html" class="action-btn"><span class="icon">🗺️</span><span class="label">地图模式</span></a>
    <a href="expenses.html" class="action-btn"><span class="icon">💰</span><span class="label">旅行记账</span></a>
    <a href="journal.html" class="action-btn"><span class="icon">📖</span><span class="label">旅行日志</span></a>
  </div>
</div>

<main class="container" style="padding:32px 0 80px;">
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:24px;">
    <h2 style="font-family:var(--font-display);font-size:1.5rem;">行程安排</h2>
    <span id="weatherSummary" style="font-size:14px;color:var(--muted-fg);"></span>
  </div>
  <div id="days"></div>

  <div id="membersSection" class="card" style="margin-top:24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);">👥 同行伙伴</h3>
      <button class="btn btn-sm btn-outline" onclick="inviteMember()"><i class="fas fa-user-plus"></i> 邀请</button>
    </div>
    <div id="membersList" style="display:flex;gap:12px;flex-wrap:wrap;"></div>
  </div>

  <div id="packingSection" class="card" style="margin-top:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);">🎒 行李清单</h3>
      <button class="btn btn-sm btn-outline" onclick="generatePackingList()"><i class="fas fa-magic"></i> AI 生成</button>
    </div>
    <div id="packingList" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:8px;"></div>
  </div>

  <div style="display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;">
    <a href="#" class="btn btn-primary btn-full btn-lg" id="actionBtn">✈️ 开始旅行</a>
    <button class="btn btn-outline btn-lg btn-full" id="deleteTripBtn" style="color:var(--danger);border-color:var(--danger);">🗑 删除行程</button>
  </div>
</main>

<script src="pages/trip-detail.js"></script>

<nav class="mobile-nav mobile-only">
  <a href="index.html"><i class="fas fa-home"></i>首页</a>
  <a href="journeys.html"><i class="fas fa-suitcase"></i>旅行</a>
  <a href="create.html"><i class="fas fa-magic"></i>AI规划</a>
</nav>
</body>
</html>
