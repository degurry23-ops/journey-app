<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 创建旅行 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .chat-ai { display: flex; gap: 12px; margin-bottom: 20px; animation: fadeInUp .4s ease-out; }
  .chat-ai .avatar { width: 40px; height: 40px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; }
  .chat-ai .bubble { background: var(--card); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; padding: 14px 18px; max-width: 80%; font-size: 15px; line-height: 1.55; }
  .chat-user { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px; animation: fadeInUp .4s ease-out; }
  .chat-user .bubble { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border-radius: 16px 16px 4px 16px; padding: 14px 18px; max-width: 75%; font-size: 15px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width .5s ease-out; }
  @media (max-width: 768px) { .chat-ai .bubble, .chat-user .bubble { max-width: 90%; } }
</style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">

<header style="padding:20px 0;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="font-family:var(--font-display);font-size:20px;color:var(--fg);text-decoration:none;display:flex;align-items:center;gap:10px;">
      <span style="width:36px;height:36px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;"><i class="fas fa-map-marker-alt"></i></span>Journey
    </a>
    <a href="index.html" style="color:var(--muted-fg);text-decoration:none;font-size:14px;"><i class="fas fa-times"></i> 取消</a>
  </div>
</header>

<!-- Phase 1: Onboarding -->
<main class="container container-form" style="flex:1;padding-top:40px;padding-bottom:120px;" id="onboarding">
  <div style="text-align:center;margin-bottom:36px;">
    <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,82,255,.2);">✨</div>
    <h1 style="font-family:var(--font-display);font-size:2rem;margin-bottom:8px;">AI 旅行<span class="gradient-text">规划师</span></h1>
    <p style="color:var(--muted-fg);font-size:15px;">30 秒，AI 帮你定制完美旅程</p>
  </div>

  <!-- Capability cards -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;">
    <div style="background:rgba(0,82,255,.04);border:1px solid rgba(0,82,255,.08);border-radius:var(--radius-lg);padding:16px;">
      <div style="font-size:20px;margin-bottom:4px;">📍</div>
      <div style="font-weight:600;font-size:14px;">推荐目的地</div>
      <div style="font-size:12px;color:var(--muted-fg);">智能匹配你的偏好</div>
    </div>
    <div style="background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.08);border-radius:var(--radius-lg);padding:16px;">
      <div style="font-size:20px;margin-bottom:4px;">🗺</div>
      <div style="font-weight:600;font-size:14px;">每日路线</div>
      <div style="font-size:12px;color:var(--muted-fg);">自动生成最优路径</div>
    </div>
    <div style="background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.08);border-radius:var(--radius-lg);padding:16px;">
      <div style="font-size:20px;margin-bottom:4px;">💰</div>
      <div style="font-weight:600;font-size:14px;">预算估算</div>
      <div style="font-size:12px;color:var(--muted-fg);">智能规划花费</div>
    </div>
    <div style="background:rgba(139,92,246,.04);border:1px solid rgba(139,92,246,.08);border-radius:var(--radius-lg);padding:16px;">
      <div style="font-size:20px;margin-bottom:4px;">🎒</div>
      <div style="font-weight:600;font-size:14px;">行李清单</div>
      <div style="font-size:12px;color:var(--muted-fg);">根据天气自动生成</div>
    </div>
  </div>

  <!-- Quick templates -->
  <div style="margin-bottom:28px;">
    <p style="font-size:12px;color:var(--muted-fg);margin-bottom:10px;text-align:center;">不知道去哪？试试这些</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;" id="templates"></div>
  </div>

  <!-- CTA -->
  <div style="text-align:center;">
    <button class="btn btn-primary btn-lg" onclick="startChat()" style="font-size:17px;padding:16px 40px;">
      ✨ 开始规划 <i class="fas fa-arrow-right"></i>
    </button>
    <p style="font-size:12px;color:var(--muted-fg);margin-top:10px;">预计 30 秒完成</p>
  </div>
</main>

<!-- Phase 2: Chat (hidden initially) -->
<div id="chatPhase" style="display:none;flex:1;flex-direction:column;">
  <!-- Step progress indicator -->
  <div class="container container-form" style="padding-top:16px;padding-bottom:8px;">
    <div id="stepProgress" style="display:flex;gap:6px;align-items:center;justify-content:center;font-size:12px;color:var(--muted-fg);"></div>
  </div>
  <main class="container container-form" style="flex:1;padding-top:16px;padding-bottom:24px;overflow-y:auto;" id="chat"></main>
</div>

<!-- Dynamic footer: changes per step -->
<footer style="position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:20px 24px;padding-bottom:max(20px,env(safe-area-inset-bottom));z-index:50;display:none;" id="planFooter">
  <div class="container container-form" id="planInputArea"></div>
</footer>

<script src="pages/create.js"></script>
</body>
</html>
