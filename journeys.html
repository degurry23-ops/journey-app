<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的旅行 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .trips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  @media (max-width: 768px) { .trips-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="header-placeholder"></div>

<main class="container" style="padding-top:32px;padding-bottom:100px;">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
    <h1 style="font-family:var(--font-display);font-size:2.5rem;margin:0;">我的<span class="gradient-text">旅行</span></h1>
    <a href="create.html" class="btn btn-primary btn-lg hide-mobile" style="border-radius:var(--radius-lg);">+ 新建旅行</a>
  </div>
  <div class="tab-bar" style="margin-bottom:28px;">
    <button class="tab active" onclick="filterTrips('all', this)">全部 (0)</button>
    <button class="tab" onclick="filterTrips('planning', this)">计划中 (0)</button>
    <button class="tab" onclick="filterTrips('traveling', this)">进行中 (0)</button>
    <button class="tab" onclick="filterTrips('completed', this)">已完成 (0)</button>
  </div>
  <div class="trips-grid" id="tripList"></div>
  <div id="emptyFilterMsg" style="display:none;text-align:center;padding:40px 20px;color:var(--muted-fg);"></div>
</main>

<a href="create.html" class="fab mobile-only" style="bottom:80px;right:20px;text-decoration:none;width:auto;padding:0 18px;border-radius:999px;gap:6px;font-size:14px;font-weight:600;" aria-label="新建旅行">+ 新建</a>

<script src="components/header.js"></script>
<script>renderHeader('journeys');</script>
<script src="pages/journeys.js"></script>
</body>
</html>
