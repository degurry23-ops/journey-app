<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>设置 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .settings-group { margin-bottom: 32px; }
  .settings-group h3 { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .15em; color: var(--muted-fg); margin-bottom: 16px; padding-left: 4px; }
  .setting-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
  .setting-item:last-child { border-bottom: none; }
  .setting-item .left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .setting-item .left i.icon-box { width: 36px; height: 36px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .setting-item .left i.blue { background: #EFF6FF; color: var(--accent); }
  .setting-item .left i.green { background: #D1FAE5; color: var(--success); }
  .setting-item .left i.red { background: #FEE2E2; color: var(--danger); }
  .setting-item .left i.amber { background: #FEF3C7; color: var(--warning); }
  .setting-item .left i.pink { background: #FEE2E2; color: var(--danger); }
  .setting-item .title { font-weight: 500; font-size: 15px; }
  .setting-item .desc { font-size: 12px; color: var(--muted-fg); margin-top: 2px; }
  .file-input-wrap { display: none; }
</style>
</head>
<body>
<div id="header-placeholder"></div>

<main class="container container-form" style="padding-top:32px;padding-bottom:80px;">
  <h1 style="font-family:var(--font-display);font-size:2.5rem;margin-bottom:32px;">设置</h1>

  <div class="settings-group">
    <h3>👤 用户信息</h3>
    <div class="card">
      <div class="setting-item">
        <div class="left"><i class="fas fa-user blue icon-box"></i><div><div class="title">昵称</div><div class="desc" id="profileName">未设置</div></div></div>
        <button class="btn btn-outline btn-sm" onclick="editProfile()">编辑</button>
      </div>
      <div class="setting-item">
        <div class="left"><i class="fas fa-key amber icon-box"></i><div><div class="title">AI API Key</div><div class="desc">使用自己的 Key 不限次数</div></div></div>
        <button class="btn btn-outline btn-sm" onclick="editApiKey()">设置</button>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <h3>📋 数据管理</h3>
    <div class="card">
      <div class="setting-item">
        <div class="left"><i class="fas fa-download green icon-box"></i><div><div class="title">导出旅行数据</div><div class="desc">备份所有旅行为 JSON 文件</div></div></div>
        <button class="btn btn-outline btn-sm" onclick="exportData()">导出</button>
      </div>
      <div class="setting-item">
        <div class="left"><i class="fas fa-upload blue icon-box"></i><div><div class="title">导入旅行数据</div><div class="desc">从 JSON 文件恢复旅行数据</div></div></div>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">导入</button>
        <input type="file" id="importFile" accept=".json" class="file-input-wrap" onchange="importData(this)">
      </div>
      <div class="setting-item">
        <div class="left"><i class="fas fa-plus amber icon-box"></i><div><div class="title">加载示例数据</div><div class="desc">添加东京、成都、上海、大理 4 条示例</div></div></div>
        <button class="btn btn-outline btn-sm" onclick="loadSampleData()">加载</button>
      </div>
      <div class="setting-item">
        <div class="left"><i class="fas fa-trash red icon-box"></i><div><div class="title">清除所有数据</div><div class="desc">删除所有旅行和照片数据</div></div></div>
        <button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger);background:transparent;" onclick="clearAllData()">清除</button>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <h3>ℹ️ 关于</h3>
    <div class="card">
      <div class="setting-item">
        <div class="left"><i class="fas fa-heart pink icon-box"></i><div><div class="title">Journey</div><div class="desc">AI 旅行手帐 · Version 1.0</div></div></div>
        <span style="font-size:12px;color:var(--muted-fg);">Made with 💙</span>
      </div>
    </div>
  </div>
</main>

<script src="components/header.js"></script>
<script>renderHeader('settings');</script>
<script src="pages/settings.js"></script>
</body>
</html>
