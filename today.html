<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Today — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .today-hero { background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 50%, #1A365D 100%); color: #fff; padding: 32px 0 40px; position: relative; overflow: hidden; }
  .today-hero::before { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,130,255,.2), transparent 70%); border-radius: 50%; pointer-events: none; }
  .today-hero::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(240,150,10,.15), transparent 60%); border-radius: 50%; pointer-events: none; }
  .weather-pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.1); padding: 10px 18px; border-radius: 999px; font-size: 15px; backdrop-filter: blur(8px); }
  .route-timeline { position: relative; padding-left: 24px; }
  .route-timeline::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
  .route-dot { position: absolute; left: -18px; top: 6px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 3px solid #fff; box-shadow: 0 0 0 2px var(--accent); }
  .route-dot.done { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
  .quick-capture { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: 3px solid #fff; box-shadow: 0 4px 16px rgba(0,82,255,.3); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; transition: all .2s; }
  .quick-capture:active { transform: scale(.95); }
  .ai-tip-card { background: linear-gradient(135deg, #EFF6FF, #FFF); border: 1px solid #DBEAFE; border-radius: var(--radius-lg); padding: 20px; position: relative; }
  .ai-tip-card::before { content: '🤖'; position: absolute; top: -14px; left: 20px; font-size: 24px; }
  @media (max-width: 768px) { .today-hero { padding: 24px 0 32px; } }
</style>
</head>
<body>

<!-- Today Hero -->
<section class="today-hero">
  <div class="container" style="position:relative;z-index:2;">
    <a href="index.html" style="color:rgba(255,255,255,.5);text-decoration:none;font-size:14px;display:inline-block;margin-bottom:16px;"><i class="fas fa-arrow-left"></i> 首页</a>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <p style="font-size:14px;opacity:.6;margin-bottom:4px;" id="todayGreeting">早上好</p>
        <h1 style="font-family:var(--font-display);font-size:clamp(1.8rem,3vw,2.5rem);" id="todayTripName"></h1>
        <p style="font-size:14px;opacity:.7;margin-top:4px;" id="todayMeta"></p>
      </div>
      <div class="weather-pill" id="todayWeather"></div>
    </div>
  </div>
</section>

<main class="container" style="padding:24px 0 80px;">

  <!-- Quick Actions -->
  <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">
    <a id="todayMapLink" href="#" class="btn btn-sm btn-outline"><i class="fas fa-map"></i> 地图</a>
    <a id="todayExpenseLink" href="#" class="btn btn-sm btn-outline"><i class="fas fa-wallet"></i> 记账</a>
    <a id="todayJournalLink" href="#" class="btn btn-sm btn-outline"><i class="fas fa-book"></i> 日志</a>
  </div>

  <!-- AI Tip -->
  <div id="aiTipCard" class="ai-tip-card" style="margin-bottom:20px;">
    <div style="display:flex;gap:12px;align-items:flex-start;">
      <span style="font-size:20px;flex-shrink:0;">💡</span>
      <div>
        <div style="font-weight:600;font-size:14px;margin-bottom:4px;">AI 今日提醒</div>
        <p style="font-size:13px;color:var(--muted-fg);line-height:1.6;" id="aiTipText"></p>
      </div>
    </div>
  </div>

  <!-- Today's Route -->
  <div class="card" style="margin-bottom:20px;">
    <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);margin-bottom:16px;">📍 今日路线</h3>
    <div class="route-timeline" id="todayRoute"></div>
  </div>

  <!-- Budget -->
  <div class="card" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);">💰 今日预算</h3>
      <span style="font-size:13px;color:var(--muted-fg);" id="todayBudgetLabel"></span>
    </div>
    <div style="height:8px;background:var(--muted);border-radius:4px;overflow:hidden;margin-bottom:8px;">
      <div id="todayBudgetBar" style="height:100%;width:0%;background:var(--success);border-radius:4px;transition:width .5s;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13px;">
      <span style="font-weight:600;" id="todayBudgetUsed">¥0</span>
      <span style="color:var(--muted-fg);" id="todayBudgetTotal"></span>
    </div>
  </div>

  <!-- Quick Capture -->
  <div style="text-align:center;margin-bottom:20px;">
    <p style="font-size:12px;color:var(--muted-fg);margin-bottom:12px;">📸 记录此刻</p>
    <div style="display:flex;justify-content:center;gap:16px;align-items:center;">
      <button class="quick-capture" onclick="quickPhoto()"><i class="fas fa-camera"></i></button>
      <button class="quick-capture" style="background:linear-gradient(135deg,#10B981,#34D399);" onclick="quickNote()"><i class="fas fa-pen"></i></button>
    </div>
    <input type="file" id="quickPhotoInput" accept="image/*" onchange="handleQuickPhoto(this)" style="display:none;">
  </div>

  <!-- Day Switcher -->
  <div style="display:flex;gap:6px;overflow-x:auto;padding:8px 0;" id="daySwitcher"></div>

</main>

<script src="pages/today.js"></script>
</body>
</html>
