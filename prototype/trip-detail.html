<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>东京之旅 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="storage.js"></script>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>:root{--bg:#FAFAFA;--fg:#0F172A;--muted:#F1F5F9;--muted-fg:#64748B;--accent:#0052FF;--accent2:#4D7CFF;--accent-fg:#FFF;--border:#E2E8F0;--card:#FFF;--radius:12px;--radius-lg:16px;--radius-xl:24px;--font-display:"Calistoga","Noto Sans SC",Georgia,serif;--font-body:"Inter","Noto Sans SC",system-ui,sans-serif;--font-mono:"JetBrains Mono",monospace}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.6}.container{max-width:1000px;margin:0 auto;padding:0 24px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .3s}.card:hover{box-shadow:0 10px 25px rgba(0,0,0,.06);transform:translateY(-1px)}.gradient-text{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);padding:12px 24px;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;min-height:48px}.btn:active{transform:scale(.98)}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-fg);box-shadow:0 4px 14px rgba(0,82,255,.2)}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,82,255,.35)}.btn-full{width:100%}.btn-lg{padding:16px 32px;font-size:17px;border-radius:var(--radius-lg)}.tag{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500}.tag-amber{background:#FEF3C7;color:#92400E}.tag-green{background:#D1FAE5;color:#065F46}.tag-blue{background:#EFF6FF;color:#1D4ED8}@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes progress{from{width:0}}.cover{background:linear-gradient(135deg,var(--fg),#1E293B);color:#fff;padding:80px 0 32px;position:relative;overflow:hidden}.cover::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(0,82,255,.35),transparent 50%),radial-gradient(circle at 20% 80%,rgba(77,124,255,.2),transparent 50%);pointer-events:none}.cover::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:-30px;position:relative;z-index:2}.action-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);text-decoration:none;color:var(--fg);transition:all .2s}.action-btn:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}.action-btn .icon{font-size:28px}.action-btn .label{font-size:13px;font-weight:500;color:var(--muted-fg)}.day-card{cursor:pointer;text-decoration:none;color:inherit;display:block;margin-bottom:12px}@media(max-width:768px){.container{padding:0 16px}.cover{padding:48px 0 24px}}</style>
</head>
<body>

<section class="cover">
  <div class="container" style="position:relative;z-index:2;">
    <a href="journeys.html" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;margin-bottom:20px;display:inline-block;"><i class="fas fa-arrow-left"></i> 返回</a>
    <div style="display:flex;align-items:start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <h1 style="font-family:var(--font-display);font-size:clamp(2rem,3vw,3rem);line-height:1.15;" id="tripTitle"></h1>
        <p style="font-size:15px;opacity:.7;margin-top:8px;" id="tripMeta"></p>
      </div>
      <span id="tripStatus" style="font-size:13px;padding:6px 14px;"></span>
    </div>
    <div style="max-width:400px;margin-top:24px;background:rgba(255,255,255,.12);border-radius:var(--radius-lg);padding:20px;backdrop-filter:blur(8px);">
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;"><span>旅行准备度</span><span style="font-weight:600;">65%</span></div>
      <div style="background:rgba(255,255,255,.15);border-radius:999px;height:8px;overflow:hidden;">
        <div style="width:65%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;animation:progress .8s ease-out;"></div>
      </div>
    </div>
  </div>
</section>

<div class="container" style="margin-top:-24px;position:relative;z-index:2;">
  <div class="quick-actions">
    <a href="map.html" class="action-btn"><span class="icon">🗺️</span><span class="label">地图模式</span></a>
    <a href="expenses.html" class="action-btn"><span class="icon">💰</span><span class="label">旅行记账</span></a>
    <a href="journal.html" class="action-btn"><span class="icon">📖</span><span class="label">旅行日志</span></a>
  </div>
</div>

<main class="container" style="padding:32px 0 80px;">
  <h2 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:20px;">行程安排</h2>
  <div id="days"></div>
  <a href="create.html" class="btn btn-primary btn-full btn-lg" style="margin-top:32px;">✈️ 开始旅行</a>
</main>

<script>
const params=new URLSearchParams(location.search);
const trip=getTripById(params.get('id'))||loadTrips()[0];
if(!trip){document.body.innerHTML='<div style="text-align:center;padding:100px;color:var(--muted-fg);"><h2>旅行不存在</h2><a href="index.html">返回首页</a></div>';}

document.getElementById('tripTitle').innerHTML=trip.destination+'<span class="gradient-text">之旅</span>';
document.getElementById('tripMeta').textContent=trip.startDate+' - '+trip.endDate+' · '+trip.days.length+'天 · 👥 '+(trip.members||1)+'人';
const statusTag=document.getElementById('tripStatus');
const st=trip.status;
statusTag.className='tag '+(st==='traveling'?'tag-green':st==='completed'?'tag-gray':'tag-amber');
statusTag.textContent=st==='traveling'?'进行中':st==='completed'?'已完成':'准备中';

// Readiness
const readiness=trip.readiness||30;
const rdBar=document.querySelector('.cover .animate-progress');
if(rdBar)rdBar.style.width=readiness+'%';
const rdPct=document.querySelector('.cover span[style*="font-weight:600"]');
if(rdPct)rdPct.textContent=readiness+'%';

// Day list
const daysEl=document.getElementById('days');
if(daysEl){
  daysEl.innerHTML=trip.days.map((d,i)=>`
    <a href="day-timeline.html?trip=${trip.id}&day=${d.id}" class="card day-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="tag tag-blue">Day ${i+1}</span>
          <span style="font-size:14px;">${d.weather||'🌤'}</span>
        </div>
        <span style="font-size:13px;color:var(--muted-fg);">${d.places?.length||0} 个地点 →</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">${(d.places||[]).map(p=>`<span style="font-size:12px;background:var(--muted);padding:3px 8px;border-radius:6px;color:var(--muted-fg);">${p.time||''} ${p.name}</span>`).join('')}</div>
    </a>
  `).join('');
}

// Quick action links
document.querySelectorAll('.action-btn').forEach(a=>{
  const href=a.getAttribute('href');
  if(href)a.setAttribute('href',href+'?trip='+trip.id);
});

// Start/Complete button
const btnArea=document.querySelector('main.container > a.btn');
if(btnArea){
  if(trip.status==='planning'){
    btnArea.textContent='✈️ 开始旅行';
    btnArea.onclick=function(){updateTrip(trip.id,{status:'traveling',readiness:Math.max(trip.readiness||30,80)});location.reload();};
  }else if(trip.status==='traveling'){
    btnArea.textContent='🏁 结束旅行，生成日志';
    btnArea.onclick=function(){trip.status='completed';trip.readiness=100;updateTrip(trip.id,{status:'completed',readiness:100});location.href='journal.html?trip='+trip.id;};
  }else{
    btnArea.textContent='📖 查看旅行日志';
    btnArea.href='journal.html?trip='+trip.id;
  }
}
</script>
</body>
</html>
