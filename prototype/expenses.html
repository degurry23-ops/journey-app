<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>旅行记账 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="storage.js"></script>
<style>:root{--bg:#FAFAFA;--fg:#0F172A;--muted:#F1F5F9;--muted-fg:#64748B;--accent:#0052FF;--accent2:#4D7CFF;--card:#FFF;--border:#E2E8F0;--radius:12px;--radius-lg:16px;--font-display:"Calistoga","Noto Sans SC",Georgia,serif;--font-body:"Inter","Noto Sans SC",system-ui,sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.6}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius);padding:10px 20px;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}.btn:active{transform:scale(.98)}.btn-primary{background:var(--accent);color:#fff}.btn-outline{background:0 0;border:1px solid var(--border);color:var(--fg)}.tag{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:500}.input{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;outline:0}.input:focus{border-color:var(--accent)}@media(max-width:768px){body{font-size:14px}}</style>
</head>
<body style="min-height:100vh;">

<header style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;">
  <a href="#" id="backLink" style="color:var(--muted-fg);text-decoration:none;font-size:14px;"><i class="fas fa-arrow-left"></i> 返回</a>
  <h1 style="font-family:var(--font-display);font-size:1.1rem;">旅行<span class="gradient-text">记账</span></h1>
  <div style="width:48px;"></div>
</header>

<div id="content" style="max-width:600px;margin:0 auto;padding:16px;"></div>

<script>
const params=new URLSearchParams(location.search);
const trip=getTripById(params.get('trip'))||loadTrips()[0];
if(!trip){document.body.innerHTML='<div style="text-align:center;padding:100px;">数据不存在</div>';}
document.getElementById('backLink').href='trip-detail.html?id='+trip.id;

if(!trip.expenses) trip.expenses=[];
const expenses=trip.expenses,total=expenses.reduce((s,e)=>s+e.amount,0);
const pp=total/(trip.members||1),cats={};
expenses.forEach(e=>{cats[e.cat]=cats[e.cat]||{total:0,icon:e.cat==='餐饮'?'🍜':e.cat==='交通'?'🚇':e.cat==='住宿'?'🏨':e.cat==='门票'?'🎫':e.cat==='购物'?'🛍':'💊'};cats[e.cat].total+=e.amount;});

function render(){
  const maxCat=Math.max(...Object.values(cats).map(c=>c.total),1);
  let h='';
  h+='<div style="background:var(--fg);color:#fff;border-radius:16px;padding:24px;margin-bottom:16px;">';
  h+='<div style="font-size:13px;opacity:.7;">总消费</div><div style="font-size:2.5rem;font-weight:700;margin:4px 0;">¥'+total.toLocaleString()+'</div>';
  h+='<div style="display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1);"><div><span style="font-size:11px;opacity:.5;">人均</span><div style="font-weight:700;">¥'+Math.round(pp).toLocaleString()+'</div></div><div><span style="font-size:11px;opacity:.5;">笔数</span><div style="font-weight:700;">'+expenses.length+'</div></div></div></div>';
  if(Object.keys(cats).length){
    h+='<div class="card" style="margin-bottom:16px;"><h3 style="font-size:12px;color:var(--muted-fg);margin-bottom:12px;">分类统计</h3>';
    Object.entries(cats).forEach(([k,v])=>{h+='<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span>'+v.icon+' '+k+'</span><span style="font-weight:600;">¥'+v.total.toLocaleString()+'</span></div><div style="height:6px;background:var(--muted);border-radius:3px;"><div style="height:6px;border-radius:3px;background:var(--accent);width:'+(v.total/maxCat*100)+'%;"></div></div></div>';});
    h+='</div>';
  }
  h+='<div style="display:flex;gap:4px;background:var(--muted);border-radius:999px;padding:3px;margin-bottom:16px;"><button class="btn" style="flex:1;border-radius:999px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.05);" onclick="renderList()">明细</button><button class="btn" style="flex:1;border-radius:999px;color:var(--muted-fg);" onclick="showSplit()">结算</button></div>';
  h+='<div id="listArea"></div>';
  document.getElementById('content').innerHTML=h;
  renderList();
}

function renderList(){
  let h='<div class="card">';
  if(!expenses.length) h+='<div style="text-align:center;padding:30px;color:var(--muted-fg);">💳 暂无消费</div>';
  else expenses.slice().reverse().forEach(e=>{h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);"><span style="font-size:22px;">'+(cats[e.cat]?.icon||'💰')+'</span><div style="flex:1;"><div style="font-weight:600;font-size:14px;">'+e.cat+(e.note?' · '+e.note:'')+'</div><div style="font-size:11px;color:var(--muted-fg);">'+(e.payer||'我')+' · '+(e.date||'')+'</div></div><span style="font-weight:700;">¥'+e.amount.toLocaleString()+'</span><span onclick="removeExpense(\''+e.id+'\')" style="color:var(--muted-fg);cursor:pointer;padding:4px;">✕</span></div>';});
  h+='</div>';
  document.getElementById('listArea').innerHTML=h;
}

function showSplit(){
  var h='<div class="card"><h3 style="font-size:12px;color:var(--muted-fg);margin-bottom:16px;">AA 分摊</h3>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><span>总消费</span><span style="font-weight:700;">¥'+total.toLocaleString()+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><span>人数</span><span style="font-weight:700;">'+(trip.members||1)+' 人</span></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px 0;"><span>每人应付</span><span style="font-weight:700;color:var(--accent);font-size:18px;">¥'+Math.round(pp).toLocaleString()+'</span></div>';
  h+='</div>';
  document.getElementById('listArea').innerHTML=h;
}

window.removeExpense=function(id){
  trip.expenses=trip.expenses.filter(e=>e.id!==id);
  saveTrips(loadTrips().map(t=>t.id===trip.id?trip:t));
  location.reload();
};

document.addEventListener('click',function(e){
  if(e.target.id==='addBtn'){
    var h='<div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:20px;box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:60;padding-bottom:max(20px,env(safe-area-inset-bottom));">';
    h+='<div style="width:32px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;"></div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">';
    ['餐饮','交通','住宿','门票','购物','其他'].forEach(c=>{h+='<span onclick="event.target.style.background=\'var(--accent)\';event.target.style.color=\'#fff\';document.getElementById(\'expCat\').value=\''+c+'\'" style="padding:5px 12px;border-radius:999px;font-size:12px;background:var(--muted);cursor:pointer;">'+c+'</span>';});
    h+='</div><input type="hidden" id="expCat" value="餐饮">';
    h+='<input class="input" id="expAmt" type="number" placeholder="金额 ¥" style="margin-bottom:8px;font-size:20px;font-weight:700;">';
    h+='<input class="input" id="expNote" placeholder="备注（可选）">';
    h+='<div style="display:flex;gap:8px;margin-top:12px;"><button onclick="this.parentElement.parentElement.remove()" class="btn btn-outline" style="flex:1;">取消</button><button onclick="addExpense()" class="btn btn-primary" style="flex:1;">记录</button></div></div>';
    document.getElementById('content').insertAdjacentHTML('beforeend',h);
  }
});

window.addExpense=function(){
  var a=document.getElementById('expAmt').value,c=document.getElementById('expCat').value,n=document.getElementById('expNote').value;
  if(!a||parseFloat(a)<=0)return;
  trip.expenses.push({id:'e-'+Date.now(),amount:parseFloat(a),cat:c,note:n,payer:'我',date:new Date().toISOString().split('T')[0]});
  saveTrips(loadTrips().map(t=>t.id===trip.id?trip:t));
  location.reload();
};

render();
</script>

<button id="addBtn" style="position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:16px;background:var(--accent);color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,82,255,.3);z-index:50;">+</button>

</body>
</html>
