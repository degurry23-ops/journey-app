<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>旅行日志 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  .cover { background: linear-gradient(135deg, var(--fg), #1E293B); color: #fff; text-align: center; padding: 80px 0 48px; position: relative; overflow: hidden; }
  .cover::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0, rgba(0,82,255,.3), transparent 60%); pointer-events: none; }
  .cover::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-item { background: var(--muted); border-radius: var(--radius-lg); padding: 20px; text-align: center; }
  .stat-item .icon { font-size: 28px; margin-bottom: 8px; }
  .stat-item .value { font-family: var(--font-display); font-size: 1.5rem; }
  .stat-item .label { font-size: 11px; color: var(--muted-fg); margin-top: 4px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-item { aspect-ratio: 1; background: var(--muted); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 40px; color: #CBD5E1; cursor: pointer; transition: all .2s; overflow: hidden; }
  .photo-item:hover { transform: scale(1.03); }
  .photo-item img { width: 100%; height: 100%; object-fit: cover; }
  .ai-summary { background: linear-gradient(135deg, #EFF6FF, #FFF); border: 1px solid #DBEAFE; border-radius: var(--radius-lg); padding: 24px; }
  @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .cover { padding: 48px 0 32px; } }
</style>
</head>
<body>

<section class="cover"><div class="container container-narrow" style="position:relative;z-index:2;">
  <a href="#" id="backLink" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;margin-bottom:24px;display:inline-block;"><i class="fas fa-arrow-left"></i> 返回</a>
  <p style="font-family:var(--font-mono);font-size:12px;opacity:.5;text-transform:uppercase;letter-spacing:.15em;margin-bottom:12px;" id="coverDates"></p>
  <h1 style="font-family:var(--font-display);font-size:clamp(2.5rem,4vw,3.5rem);line-height:1.15;" id="coverTitle"></h1>
  <div class="separator"></div>
  <p style="font-size:14px;opacity:.4;margin-top:12px;">Journey Travel Journal</p>
</div></section>

<main class="container container-narrow" style="margin-top:-20px;position:relative;z-index:2;padding-bottom:60px;">
  <div class="stats-grid" style="margin-bottom:24px;" id="statsGrid"></div>
  <div class="card" style="margin-bottom:20px;">
    <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);margin-bottom:20px;">📖 每日回顾</h3>
    <div id="dailyRecap"></div>
  </div>
  <div class="ai-summary" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <div style="width:32px;height:32px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;">AI</div>
      <h3 style="font-weight:600;font-size:15px;">AI 旅行总结</h3>
    </div>
    <p style="font-size:14px;color:var(--muted-fg);line-height:1.7;" id="aiSummary"></p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;" id="aiTags"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="regenerateAI()">🤖 AI 重新生成</button>
  </div>
  <div class="card" style="margin-bottom:20px;">
    <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);margin-bottom:16px;">💸 消费分布</h3>
    <div id="expenseChart" style="width:100%;height:200px;"></div>
  </div>
  <div class="card" style="margin-bottom:24px;">
    <h3 style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted-fg);margin-bottom:16px;">📷 照片墙</h3>
    <div class="photo-grid" id="photos"></div>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(this)" style="display:none;">
  </div>
  <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:16px;" onclick="generateShareCard()"><i class="fas fa-share-alt"></i> 生成分享卡片</button>
  <div id="shareOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;" onclick="this.style.display='none'">
    <div id="shareCard" style="background:#fff;border-radius:var(--radius-xl);padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);" onclick="event.stopPropagation()"></div>
    <button class="btn btn-primary" onclick="copyShareCard()" style="z-index:201;">📋 复制文字分享</button>
  </div>
  <p style="text-align:center;font-size:12px;color:var(--muted-fg);">Made with 💙 Journey · Every Journey Deserves to Be Remembered</p>
</main>

<script src="pages/journal.js"></script>

<nav class="mobile-nav mobile-only">
  <a href="index.html"><i class="fas fa-home"></i>首页</a>
  <a href="journeys.html"><i class="fas fa-suitcase"></i>旅行</a>
  <a href="create.html"><i class="fas fa-magic"></i>AI规划</a>
</nav>
</body>
</html>
